set -g mouse on
set -g default-terminal "tmux-256color"
set -g history-limit 100000
set -g prefix C-a
unbind C-b
bind C-a send-prefix
setw -g allow-rename off
setw -g automatic-rename off

set -g @plugin 'tmux-plugins/tpm'

# config catppuccin
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_date_time_text "%a %d %b %H:%M"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
set -g status-right-length 140
set -g status-left-length 100
set -g status-interval 5


set -g status-left "#[fg=#{@ctp_crust},bg=#{@ctp_mauve},bold] #S #[fg=#{@ctp_surface_1},bg=#{@ctp_bg}] | "
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_date_time}"
set -agF status-right "#{E:@catppuccin_status_battery}"


# Some basic mocha colors.
set -g @ctp_bg "#24273a"
set -g @ctp_surface_1 "#494d64"
set -g @ctp_fg "#cad3f5"
set -g @ctp_mauve "#c6a0f6"
set -g @ctp_crust "#181926"

# status line
set -gF status-style "bg=#{@ctp_bg},fg=#{@ctp_fg}"
set -g status-position top

# windows
set -gF window-status-format "#[bg=#{@ctp_surface_1},fg=#{@ctp_fg}] #I #W "
set -gF window-status-current-format "#[bg=#{@ctp_mauve},fg=#{@ctp_crust}] #I #W "

run '~/.tmux/plugins/tpm/tpm'
